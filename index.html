<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Velora - Video Editor OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000;
  --bg-soft: #050505;
  --card: #101010;
  --card-2: #151515;
  --card-3: #1d1d1d;
  --text: #f1f1f1;
  --muted: #b3b3b3;
  --faint: #777777;
  --line: rgba(255,255,255,.055);
  --accent-blue: #ffffff;
  --accent-green: #ffffff;
  --primary: #ffffff;
  --primary-text: #0c0c0d;
  --good: #53d37d;
  --warn: #f5a84c;
  --bad: #f56b6b;
  --info: #67a7ff;
  --shadow: 0 20px 60px rgba(0,0,0,.45);
}
body.theme-white {
  --bg: #f5f5f3;
  --bg-soft: #ffffff;
  --card: #ffffff;
  --card-2: #eeeeec;
  --card-3: #e2e2df;
  --text: #121214;
  --muted: #64646b;
  --faint: #85858c;
  --line: rgba(0,0,0,.09);
  --primary: #111113;
  --primary-text: #ffffff;
  --shadow: 0 18px 45px rgba(0,0,0,.11);
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  min-height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: "Plus Jakarta Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: geometricPrecision;
  overflow-x: hidden;
}
button, input, textarea, select { font: inherit; }
button { cursor: pointer; }
h1, h2, h3, h4, b, strong { font-weight: 500; }
[style*="font-weight:800"], [style*="font-weight: 800"], [style*="font-weight:700"], [style*="font-weight: 700"] {
  font-weight: 500 !important;
}
.material-symbols-outlined {
  font-variation-settings: "FILL" 0, "wght" 350, "GRAD" 0, "opsz" 24;
  font-size: 22px;
  line-height: 1;
}
.fill { font-variation-settings: "FILL" 1, "wght" 450, "GRAD" 0, "opsz" 24; }
.app-root { min-height: 100dvh; }
.auth-wrap {
  min-height: 100dvh;
  display: grid;
  place-items: center;
  padding: 24px;
}
.phone-card {
  width: min(430px, 100%);
  min-height: min(780px, calc(100dvh - 32px));
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: 34px;
  box-shadow: var(--shadow);
  padding: 28px 24px;
  position: relative;
  overflow: hidden;
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.brand-mark {
  width: 48px;
  height: 48px;
  border-radius: 17px;
  display: grid;
  place-items: center;
  background: #111111;
  color: #ffffff;
  font-weight: 500;
  letter-spacing: -.05em;
}
.brand h1 { margin: 0; font-size: 24px; letter-spacing: -.01em; font-weight: 500; }
.brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
.auth-hero { margin-top: 54px; }
.auth-hero h2 { margin: 0; font-size: clamp(34px, 9vw, 48px); line-height: 1.08; letter-spacing: -.015em; font-weight: 500; }
.auth-hero p { color: var(--muted); line-height: 1.6; margin: 18px 0 0; font-size: 14px; }
.form-stack { display: grid; gap: 12px; margin-top: 28px; }
.field, .select, .textarea {
  width: 100%;
  border: 1px solid var(--line);
  background: #121212;
  color: var(--text);
  border-radius: 14px;
  padding: 14px 15px;
  outline: none;
  min-height: 50px;
}
.field::placeholder, .textarea::placeholder { color: var(--faint); }
.field:focus, .select:focus, .textarea:focus { border-color: rgba(255,255,255,.25); box-shadow: 0 0 0 3px rgba(255,255,255,.06); }
body.theme-white .field:focus, body.theme-white .select:focus, body.theme-white .textarea:focus { border-color: rgba(0,0,0,.22); box-shadow: 0 0 0 3px rgba(0,0,0,.05); }
input[type="date"].field {
  color-scheme: dark;
  background: #121212;
  color: var(--text);
}
body.theme-white input[type="date"].field { color-scheme: light; }
select.select option { background: var(--card); color: var(--text); }
.textarea { resize: vertical; min-height: 105px; line-height: 1.45; }
.label { display: block; color: var(--muted); font-size: 11px; font-weight: 400; text-transform: uppercase; letter-spacing: .08em; margin: 0 0 7px; }
.btn {
  border: 0;
  min-height: 50px;
  border-radius: 15px;
  padding: 12px 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-weight: 500;
  transition: transform .12s ease, opacity .15s ease, background .15s ease;
}
.btn:active { transform: scale(.98); }
.btn-primary { background: #111111; color: #ffffff; }
.btn-primary .material-symbols-outlined { color: #ffffff; }
.btn-secondary { background: var(--card-2); color: var(--text); border: 1px solid var(--line); }
.btn-green { background: #111111; color: #ffffff; border: 0; }
.btn-green .material-symbols-outlined { color: #ffffff; }
.btn-danger { background: rgba(245,107,107,.12); color: var(--bad); border: 1px solid rgba(245,107,107,.2); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid transparent; }
.btn-small { min-height: 36px; border-radius: 12px; padding: 8px 11px; font-size: 12px; }
.btn[disabled] { opacity: .45; pointer-events: none; }

.shell {
  display: grid;
  grid-template-columns: 1fr;
  min-height: 100dvh;
}
.sidebar {
  display: none;
  position: fixed;
  inset: 0 auto 0 0;
  width: 250px;
  padding: 22px 14px;
  background: #050505;
  border-right: 1px solid var(--line);
  z-index: 20;
}
.side-nav { display: grid; gap: 7px; margin-top: 28px; }
.nav-link {
  width: 100%;
  border: 0;
  background: transparent;
  color: var(--muted);
  border-radius: 15px;
  min-height: 48px;
  padding: 0 13px;
  display: flex;
  align-items: center;
  gap: 11px;
  text-align: left;
  font-weight: 400;
}
.nav-link.active { background: #000000; color: #ffffff; border: 1px solid rgba(255,255,255,0.15); }
.main {
  width: 100%;
  max-width: 1180px;
  margin: 0 auto;
  padding: 18px 16px 110px;
}
.mobile-top {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 0 14px;
  backdrop-filter: blur(18px);
}
.page-title { font-size: 24px; font-weight: 500; letter-spacing: -.01em; }
.avatar-sm, .avatar-lg {
  border-radius: 50%;
  overflow: hidden;
  background: var(--card-3);
  display: grid;
  place-items: center;
  color: var(--text);
  font-weight: 500;
  border: 1px solid var(--line);
}
.avatar-sm { width: 42px; height: 42px; }
.avatar-lg { width: 100px; height: 100px; font-size: 34px; }
.avatar-sm img, .avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
.bottom-nav {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 30;
  padding: 12px 14px 18px;
  background: linear-gradient(to top, var(--bg) 70%, transparent);
}
.bottom-pill {
  height: 70px;
  max-width: 520px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  align-items: center;
  gap: 5px;
  padding: 8px;
  border-radius: 999px;
  background: rgba(10,10,10,.94);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  backdrop-filter: blur(22px);
}
.bottom-btn {
  height: 52px;
  border: 0;
  border-radius: 50%;
  background: transparent;
  color: var(--muted);
  display: grid;
  place-items: center;
}
.bottom-btn.active { background: #ffffff; color: #000000; }
.grid { display: grid; gap: 14px; }
.grid-2, .grid-3, .grid-4 { display: grid; gap: 14px; grid-template-columns: 1fr; }
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 18px;
  box-shadow: 0 1px 0 rgba(255,255,255,.025) inset;
}
.card.tight { padding: 14px; border-radius: 16px; }
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 13px;
}
.section-head h2, .section-head h3 { margin: 0; font-size: 16px; letter-spacing: -.005em; font-weight: 500; }
.muted { color: var(--muted); }
.faint { color: var(--faint); }
.tiny { font-size: 11px; }
.small { font-size: 12px; }
.value { font-size: 28px; font-weight: 300; letter-spacing: -.01em; }
.stat { min-height: 122px; display: grid; align-content: space-between; }
.stat .material-symbols-outlined { color: var(--muted); }
.stat-label { color: var(--muted); font-size: 12px; font-weight: 400; }
.stat-sub { color: var(--faint); font-size: 12px; margin-top: 4px; }
.row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.between { justify-content: space-between; }
.stack { display: grid; gap: 12px; }
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  min-height: 24px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  background: var(--card-2);
  color: var(--muted);
  border: 1px solid var(--line);
}
.chip.good { color: #111111; background: #ffffff; border-color: rgba(255,255,255,0.3); }
.chip.warn { color: #ffffff; background: #444444; border-color: #555555; }
.chip.bad { color: var(--bad); background: rgba(245,107,107,.1); border-color: rgba(245,107,107,.18); }
.chip.info { color: var(--info); background: rgba(103,167,255,.1); border-color: rgba(103,167,255,.18); }
.progress {
  height: 9px;
  background: var(--card-2);
  border-radius: 999px;
  overflow: hidden;
}
.progress > div {
  height: 100%;
  width: 0;
  border-radius: inherit;
  background: #ffffff;
  transition: width .25s ease;
}
.search-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
.filters { display: flex; gap: 9px; overflow-x: auto; padding-bottom: 4px; }
.filters > * { min-width: max-content; }
.list-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px;
}
.icon-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid var(--line);
  background: var(--card-2);
  color: var(--text);
  display: grid;
  place-items: center;
}
.toggle {
  width: 48px;
  height: 28px;
  border-radius: 999px;
  background: var(--card-3);
  padding: 3px;
  border: 1px solid var(--line);
  position: relative;
  display: inline-flex;
  align-items: center;
}
.toggle span {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--muted);
  transition: transform .2s, background .2s;
}
.toggle.on { background: #ffffff; }
.toggle.on span { transform: translateX(20px); background: #111111; }
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 80;
  background: rgba(0,0,0,.72);
  display: none;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(10px);
}
.modal-overlay.open { display: flex; }
.modal {
  width: 100%;
  max-height: 92dvh;
  overflow: auto;
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: 28px 28px 0 0;
  padding: 18px;
  box-shadow: var(--shadow);
}
.hero-panel {
  background: transparent;
  border: 0;
  box-shadow: none;
  padding: 4px 0 8px;
}
.hero-title {
  margin: 5px 0 4px;
  font-size: 30px;
  line-height: 1.08;
  letter-spacing: -.012em;
  font-weight: 500;
}
.blue-box, .green-box {
  display: inline-flex;
  align-items: center;
  border-radius: 14px;
  padding: .08em .34em .12em;
  line-height: 1.05;
  box-decoration-break: clone;
  -webkit-box-decoration-break: clone;
}
.blue-box { background: transparent; color: var(--text); }
.green-box { background: #ffffff; color: #000000; }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
}
.modal-header h2 { margin: 0; font-size: 20px; letter-spacing: -.04em; }
.tabs {
  display: flex;
  gap: 5px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 4px;
  overflow-x: auto;
}
.tab {
  border: 0;
  background: transparent;
  color: var(--muted);
  border-radius: 999px;
  padding: 9px 12px;
  font-weight: 500;
  font-size: 12px;
  min-width: max-content;
}
.tab.active { background: #111111; color: #ffffff; }
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.cal-head {
  color: var(--faint);
  font-size: 10px;
  font-weight: 500;
  text-align: center;
  padding: 5px 0;
}
.cal-day {
  min-height: 52px;
  border-radius: 15px;
  background: var(--card-2);
  border: 1px solid var(--line);
  padding: 7px;
  color: var(--muted);
  display: grid;
  align-content: space-between;
}
.cal-day.off { opacity: .35; }
.cal-day.active { color: var(--text); background: var(--card-3); border-color: rgba(255,255,255,0.25); }
.cal-num { font-size: 12px; font-weight: 500; }
.dots { display: flex; gap: 3px; flex-wrap: wrap; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.dot.pay { background: var(--good); }
.dot.done { background: var(--info); }
.dot.due { background: var(--warn); }
.graph {
  width: 100%;
  height: 180px;
  display: block;
}
.year-strip {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 9px;
}
.month-mini {
  border: 1px solid var(--line);
  background: var(--card-2);
  border-radius: 16px;
  padding: 10px;
}
.toast-wrap {
  position: fixed;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 120;
  display: grid;
  gap: 8px;
  width: min(440px, calc(100vw - 24px));
  pointer-events: none;
}
.toast {
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--text);
  border-radius: 16px;
  padding: 12px 14px;
  box-shadow: var(--shadow);
  font-size: 13px;
  font-weight: 400;
}
.toast.good { color: var(--good); border-color: rgba(83,211,125,.25); }
.toast.bad { color: var(--bad); border-color: rgba(245,107,107,.25); }
.hidden { display: none !important; }
.divider { height: 1px; background: var(--line); margin: 8px 0; }
.money-hidden { filter: blur(7px); user-select: none; }
.checkbox-row {
  display: flex;
  align-items: center;
  gap: 9px;
  color: var(--text);
  font-size: 13px;
  font-weight: 400;
}
.checkbox-row input { width: 17px; height: 17px; accent-color: var(--primary); }
.desktop-only { display: none; }
@media (min-width: 640px) {
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .year-strip { grid-template-columns: repeat(4, 1fr); }
  .modal { max-width: 680px; border-radius: 28px; }
  .modal-overlay { align-items: center; padding: 18px; }
}
@media (min-width: 768px) {
  .sidebar { display: flex; flex-direction: column; }
  .bottom-nav { display: none; }
  .main { margin-left: 250px; padding: 28px 28px 44px; }
  .mobile-top { display: none; }
  .desktop-only { display: block; }
}
@media (min-width: 1020px) {
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .page-layout { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 16px; align-items: start; }
}

.profile-center-wrap { width: 100%; }
.profile-inner { width: 100%; }
@media (min-width: 768px) {
  .profile-center-wrap { display: flex; justify-content: center; align-items: flex-start; }
  .profile-inner { max-width: 600px; width: 100%; }
}
</style>
</head>
<body>
<div id="toast" class="toast-wrap"></div>
<div id="app" class="app-root"></div>
<div id="modalOverlay" class="modal-overlay" onclick="modalOutside(event)">
  <div id="modalBox" class="modal">
    <div id="modalContent"></div>
  </div>
</div>
<datalist id="timezoneList"></datalist>

<script>
const STORE_KEY = "velora_app_v1";
const ADMIN_EMAIL = "admin";
const ADMIN_PASSWORD = "admin";

const CURRENCIES = [
  "USD","EUR","GBP","PKR","INR","AED","SAR","CAD","AUD","JPY","CHF","SGD","MYR","BDT","TRY","BRL","MXN","ZAR","NGN","PHP","IDR","THB","VND","KRW"
];
const FALLBACK_RATES = {
  USD:1, EUR:.92, GBP:.79, PKR:278, INR:83.2, AED:3.67, SAR:3.75, CAD:1.36, AUD:1.51, JPY:156,
  CHF:.9, SGD:1.35, MYR:4.7, BDT:117, TRY:32.2, BRL:5.14, MXN:16.8, ZAR:18.5, NGN:1480, PHP:57.4, IDR:16200, THB:36.6, VND:25400, KRW:1360
};
const COUNTRIES = ["Pakistan","India","United States","United Kingdom","United Arab Emirates","Saudi Arabia","Canada","Australia","Germany","France","Italy","Spain","Netherlands","Bangladesh","Malaysia","Singapore","Japan","South Korea","Brazil","Mexico","South Africa","Nigeria","Turkey","Philippines","Indonesia","Thailand","Vietnam","Other"];
const COUNTRY_CURRENCY = { Pakistan:"PKR", India:"INR", "United States":"USD", "United Kingdom":"GBP", "United Arab Emirates":"AED", "Saudi Arabia":"SAR", Canada:"CAD", Australia:"AUD", Germany:"EUR", France:"EUR", Italy:"EUR", Spain:"EUR", Netherlands:"EUR", Bangladesh:"BDT", Malaysia:"MYR", Singapore:"SGD", Japan:"JPY", "South Korea":"KRW", Brazil:"BRL", Mexico:"MXN", "South Africa":"ZAR", Nigeria:"NGN", Turkey:"TRY", Philippines:"PHP", Indonesia:"IDR", Thailand:"THB", Vietnam:"VND" };
const PRIORITIES = ["Urgent","High","Medium","Normal"];
const STATUSES = ["Not Started","In Progress","Under Review","Completed","On Hold"];
const PAYMENT_TYPES = ["Per Video","Per Minute","Free","Custom"];
const PLATFORMS = ["YouTube","Instagram","TikTok","LinkedIn","X","Twitch","Facebook","Other"];
const OUTREACH_STATUS = ["Sent","Replied","No Reply","Booked Call","Converted to Client","Rejected"];
const EXPENSE_CATEGORIES = ["Editing Software","Music & SFX","AI Tools","Storage","Communication","Marketing","Design","Other"];
const BILLING = ["Monthly","Yearly","One-time"];
const EXPENSE_STATUS = ["Active","Cancelled","Paused"];
const WEEKDAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
let app = load();
let activePage = app.ui.activePage || "dashboard";
let previousPages = [];
let rates = {...FALLBACK_RATES};

function defaultState() {
  return {
    session: null,
    subscriptionActive: false,
    profile: {
      name: "",
      email: "",
      description: "",
      photo: "",
      country: "",
      countryCurrency: "USD",
      extraCurrencies: ["USD"],
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC",
      clientTimezones: [],
      hidePayment: false,
      theme: "default"
    },
    clients: [],
    projects: [],
    clientNotes: [],
    generalNotes: [],
    outreach: [],
    expenses: [],
    monthlyTargets: {},
    ui: { activePage: "dashboard", notesTab: "client", earnMonth: new Date().getMonth(), earnYear: new Date().getFullYear(), projectFilter: "All", projectSort: "deadline", projectQuery: "", outreachStatus: "All", outreachPlatform: "All", noteQuery: "" }
  };
}
function load() {
  try {
    const parsed = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
    return mergeDefaults(defaultState(), parsed || {});
  } catch {
    return defaultState();
  }
}
function mergeDefaults(base, value) {
  for (const key in value) {
    if (value[key] && typeof value[key] === "object" && !Array.isArray(value[key]) && base[key]) base[key] = mergeDefaults(base[key], value[key]);
    else base[key] = value[key];
  }
  return base;
}
function save() {
  app.ui.activePage = activePage;
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(app));
    return true;
  } catch (error) {
    console.warn("Velora storage save failed", error);
    toast("Browser storage is full. Try a smaller profile photo.", "bad");
    return false;
  }
}
function id() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function esc(v) { return String(v ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m])); }
function attr(v) { return esc(v).replace(/`/g, "&#96;"); }
function num(v) { return Number(v || 0) || 0; }
function cleanTz(v) { return String(v || "UTC").split(" - ")[0].trim() || "UTC"; }
function profileCurrency() { return app.profile.countryCurrency || "USD"; }
function fmt(amount, currency = profileCurrency()) {
  const formatted = new Intl.NumberFormat("en", { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num(amount));
  return `${currency} ${formatted}`;
}
function money(amount, currency = profileCurrency()) {
  const value = fmt(amount, currency);
  return app.profile.hidePayment ? `<span class="money-hidden">${value}</span>` : value;
}
function convert(amount, from = "USD", to = profileCurrency()) {
  if (from === to) return num(amount);
  const fromRate = rates[from] || FALLBACK_RATES[from] || 1;
  const toRate = rates[to] || FALLBACK_RATES[to] || 1;
  return num(amount) / fromRate * toRate;
}
function toUSD(amount, from) { return convert(amount, from, "USD"); }
function fromUSD(amount, to) { return convert(amount, "USD", to); }
function todayInTz(tz = app.profile.timezone) {
  const parts = new Intl.DateTimeFormat("en-CA", { timeZone: cleanTz(tz), year:"numeric", month:"2-digit", day:"2-digit" }).formatToParts(new Date());
  const obj = Object.fromEntries(parts.map(p => [p.type, p.value]));
  return `${obj.year}-${obj.month}-${obj.day}`;
}
function monthKey(year = new Date().getFullYear(), month = new Date().getMonth()) { return `${year}-${String(month + 1).padStart(2,"0")}`; }
function dateMonthKey(date) { return date ? date.slice(0,7) : ""; }
function prettyDate(date) {
  if (!date) return "No date";
  const [y,m,d] = date.split("-").map(Number);
  return new Date(Date.UTC(y, m - 1, d)).toLocaleDateString("en", { day:"2-digit", month:"short", year:"numeric", timeZone:"UTC" });
}
function daysBetween(date) {
  if (!date) return 9999;
  const a = new Date(todayInTz() + "T00:00:00Z");
  const b = new Date(date + "T00:00:00Z");
  return Math.ceil((b - a) / 86400000);
}
function projectAmount(p, targetCurrency = profileCurrency()) {
  if (p.paymentType === "Free") return 0;
  return convert(num(p.amount), p.currency || profileCurrency(), targetCurrency);
}
function projectEarned(p) { return p.paymentReceived && p.paymentType !== "Free"; }
function projectPaymentDate(p) { return p.paymentDate || p.deliveredDate || p.updatedAt?.slice(0,10) || p.createdAt?.slice(0,10) || todayInTz(); }
function monthProjects(year, month) {
  const key = monthKey(year, month);
  return app.projects.filter(p => projectEarned(p) && dateMonthKey(projectPaymentDate(p)) === key);
}
function monthlyEarnings(year = new Date().getFullYear(), month = new Date().getMonth(), currency = profileCurrency()) {
  return monthProjects(year, month).reduce((sum, p) => sum + projectAmount(p, currency), 0);
}
function lifetimeEarnings(currency = profileCurrency()) {
  return app.projects.filter(projectEarned).reduce((sum, p) => sum + projectAmount(p, currency), 0);
}
function pendingPayments(currency = profileCurrency()) {
  return app.projects.filter(p => !p.paymentReceived && p.paymentType !== "Free").reduce((sum, p) => sum + projectAmount(p, currency), 0);
}
function activeProjects() { return app.projects.filter(p => ["Not Started","In Progress","Under Review","On Hold"].includes(p.status)); }
function upcomingDeadlines() { return app.projects.filter(p => p.deadline && daysBetween(p.deadline) >= 0 && daysBetween(p.deadline) <= 7 && p.status !== "Completed"); }
function urgentProjects() { return app.projects.filter(p => ["Urgent","High"].includes(p.priority) && p.status !== "Completed"); }
function monthlyExpense(currency = profileCurrency()) {
  return app.expenses.filter(e => e.status === "Active").reduce((sum, e) => {
    const converted = convert(num(e.amount), e.currency || profileCurrency(), currency);
    if (e.billing === "Monthly") return sum + converted;
    if (e.billing === "Yearly") return sum + converted / 12;
    return sum;
  }, 0);
}
function yearlyExpense(currency = profileCurrency()) {
  return app.expenses.filter(e => e.status === "Active").reduce((sum, e) => {
    const converted = convert(num(e.amount), e.currency || profileCurrency(), currency);
    if (e.billing === "Monthly") return sum + converted * 12;
    if (e.billing === "Yearly") return sum + converted;
    return sum + converted;
  }, 0);
}
function priorityClass(p) { return p === "Urgent" ? "bad" : p === "High" ? "warn" : p === "Medium" ? "info" : ""; }
function statusClass(s) { return s === "Completed" ? "good" : s === "In Progress" ? "info" : s === "Under Review" ? "warn" : s === "On Hold" ? "" : ""; }
function validateUrl(value, optional = true) {
  if (!value && optional) return true;
  try { new URL(value); return true; } catch { return false; }
}
function toast(message, type = "good") {
  const host = document.getElementById("toast");
  const item = document.createElement("div");
  item.className = `toast ${type}`;
  item.textContent = message;
  host.appendChild(item);
  setTimeout(() => item.remove(), 3200);
}
function openModal(html) {
  document.getElementById("modalContent").innerHTML = html;
  document.getElementById("modalOverlay").classList.add("open");
  setTimeout(() => document.querySelector("#modalContent input, #modalContent select, #modalContent textarea")?.focus(), 80);
}
function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); document.getElementById("modalContent").innerHTML = ""; }
function modalOutside(event) { if (event.target.id === "modalOverlay") closeModal(); }
function confirmAction(message, action) {
  openModal(`
    <div class="modal-header">
      <h2>Confirm action</h2>
      <button class="icon-btn" onclick="closeModal()"><span class="material-symbols-outlined">close</span></button>
    </div>
    <p class="muted" style="line-height:1.55;margin:0 0 18px">${esc(message)}</p>
    <div class="grid-2">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="${action}">Delete</button>
    </div>
  `);
}
function setTheme() {
  app.profile.theme = "default";
  document.body.classList.remove("theme-white");
}
async function loadRates() {
  try {
    const response = await fetch("https://open.er-api.com/v6/latest/USD");
    const data = await response.json();
    if (data && data.rates) {
      rates = {...FALLBACK_RATES, ...data.rates, USD: 1};
      render();
    }
  } catch {
    rates = {...FALLBACK_RATES};
  }
}

function timezoneOptions() {
  let zones = [];
  try { zones = Intl.supportedValuesOf ? Intl.supportedValuesOf("timeZone") : []; } catch { zones = []; }
  if (!zones.length) zones = ["UTC","Asia/Karachi","Asia/Kolkata","America/New_York","America/Los_Angeles","Europe/London","Europe/Berlin","Asia/Dubai","Australia/Sydney"];
  const aliases = {
    "Asia/Karachi":"Pakistan", "Asia/Kolkata":"India", "America/New_York":"United States Eastern", "America/Chicago":"United States Central",
    "America/Los_Angeles":"United States Pacific", "Europe/London":"United Kingdom", "Asia/Dubai":"United Arab Emirates", "Asia/Riyadh":"Saudi Arabia",
    "Asia/Dhaka":"Bangladesh", "Australia/Sydney":"Australia", "America/Toronto":"Canada"
  };
  return zones.map(z => `${z} - ${aliases[z] || z.split("/")[0]}`);
}
function fillTimezoneDatalist() {
  const list = document.getElementById("timezoneList");
  list.innerHTML = timezoneOptions().map(tz => `<option value="${attr(tz)}"></option>`).join("");
}

function render() {
  setTheme();
  save();
  if (!app.session) return renderLogin();
  app.subscriptionActive = true;
  renderShell();
}

window.loginClick = function() {
  var email = document.getElementById("loginEmail").value.trim();
  var pass = document.getElementById("loginPassword").value.trim();
  if (email !== ADMIN_EMAIL || pass !== ADMIN_PASSWORD) { toast("Wrong email or password.", "bad"); return; }
  app.session = { email: "admin@velora.demo", name: app.profile.name || "Admin", photo: app.profile.photo || "" };
  app.profile.email = app.profile.email || "admin@velora.demo";
  app.subscriptionActive = true;
  save();
  render();
};

function activatePlan(event) {
  event.preventDefault();
  const card = document.getElementById("cardNumber").value.replace(/\s/g,"");
  const expiry = document.getElementById("cardExpiry").value.trim();
  const cvc = document.getElementById("cardCvc").value.trim();
  if (card.length < 12 || !/^\d+$/.test(card)) return toast("Enter a valid demo card number.", "bad");
  if (!/^\d{2}\/\d{2}$/.test(expiry)) return toast("Use expiry format MM/YY.", "bad");
  if (!/^\d{3,4}$/.test(cvc)) return toast("Enter a valid CVC.", "bad");
  app.subscriptionActive = true;
  toast("Subscription activated.");
  render();
}
function logout() {
  app.session = null;
  save();
  toast("Signed out.");
  render();
}

function pageTitle(page) {
  return { dashboard:"Dashboard", projects:"Projects", earnings:"Earnings", notes:"Notes", expenses:"Expenses", profile:"Profile" }[page] || "Velora";
}
function navButtons(kind) {
  const pages = [
    ["dashboard","dashboard","Dashboard"],["projects","folder","Projects"],["earnings","payments","Earnings"],
    ["notes","sticky_note_2","Notes"],["expenses","receipt_long","Expenses"],["profile","person","Profile"]
  ];
  return pages.map(([page, icon, label]) => kind === "bottom"
    ? `<button class="bottom-btn ${activePage===page?"active":""}" onclick="go('${page}')" title="${label}"><span class="material-symbols-outlined ${activePage===page?"fill":""}">${icon}</span></button>`
    : `<button class="nav-link ${activePage===page?"active":""}" onclick="go('${page}')"><span class="material-symbols-outlined ${activePage===page?"fill":""}">${icon}</span>${label}</button>`
  ).join("");
}
function desktopHeader() {
  return `
    <div class="hero-panel row between">
      <div class="row" style="gap:12px">
        ${activePage !== "dashboard" ? `<button class="icon-btn" onclick="goBack()"><span class="material-symbols-outlined">arrow_back</span></button>` : ""}
        <div>
        <div class="tiny muted" style="font-weight:800;text-transform:uppercase;letter-spacing:.12em">${new Date().toLocaleDateString("en", { weekday:"long", month:"long", day:"numeric" })}</div>
        <div class="hero-title">${pageTitle(activePage)}</div>
        <div class="small muted">Velora - ${esc(app.profile.description || "Freelance Video Editor")}</div>
        </div>
      </div>
      <button class="avatar-sm" onclick="go('profile')">${avatarHtml("sm")}</button>
    </div>`;
}
function avatarHtml(size) {
  const photo = app.profile.photo || app.session?.photo || "";
  const name = app.profile.name || app.session?.name || "V";
  if (photo) return `<img alt="Profile" src="${attr(photo)}">`;
  return `<span>${esc(name[0] || "V")}</span>`;
}
function go(page) {
  if (page !== activePage) {
    previousPages.push(activePage);
    if (previousPages.length > 20) previousPages = previousPages.slice(-20);
    app.ui.lastPage = activePage;
  }
  activePage = page;
  render();
}
function goBack() {
  const fallback = activePage === "dashboard" ? "dashboard" : (app.ui.lastPage && app.ui.lastPage !== activePage ? app.ui.lastPage : "dashboard");
  activePage = previousPages.pop() || fallback;
  app.ui.lastPage = "dashboard";
  render();
}
function pageHtml(page) {
  if (page === "projects") return projectsHtml();
  if (page === "earnings") return earningsHtml();
  if (page === "notes") return notesHtml();
  if (page === "expenses") return expensesHtml();
  if (page === "profile") return profileHtml();
  return dashboardHtml();
}

function dashboardHtml() {
  const y = new Date().getFullYear();
  const m = new Date().getMonth();
  const earned = monthlyEarnings(y, m);
  const targetKey = monthKey(y,m);
  const target = num(app.monthlyTargets[targetKey]);
  const progress = target > 0 ? Math.min(100, Math.round(earned / target * 100)) : 0;
  const completedThisMonth = monthProjects(y,m).slice(-4).reverse();
  const net = earned - monthlyExpense();
  return `
    <div class="grid">
      <div class="card row between">
        <div>
          <div class="tiny muted" style="font-weight:800;text-transform:uppercase;letter-spacing:.1em">Velora</div>
          <h1 class="hero-title"><span class="blue-box">Good day</span> <span class="green-box">${esc(app.profile.name || "Editor")}</span></h1>
          <div class="small muted">${esc(app.profile.description || "Add your description in Profile")} - ${esc(app.profile.email || "admin@velora.demo")}</div>
        </div>
        <button class="avatar-sm" onclick="go('profile')">${avatarHtml("sm")}</button>
      </div>
      <div class="grid-4">
        ${statCard("Active projects", activeProjects().length, "editing now", "folder")}
        ${statCard("Upcoming deadlines", upcomingDeadlines().length, "next 7 days", "event")}
        ${statCard("Urgent / High", urgentProjects().length, "needs attention", "priority_high")}
        ${statCard("Pending payments", money(pendingPayments()), "unpaid work", "payments")}
        ${statCard("Monthly earnings", money(earned), MONTHS[m], "trending_up")}
        ${statCard("Lifetime earnings", money(lifetimeEarnings()), "all time", "savings")}
        ${statCard("Monthly expenses", money(monthlyExpense()), "active tools", "receipt_long")}
        ${statCard("Net monthly", money(net), "after expenses", "account_balance_wallet")}
      </div>
      <div class="grid-2">
        <div class="card">
          <div class="section-head"><h2>Monthly target</h2><button class="btn btn-small btn-green" onclick="openTargetModal()">Edit target</button></div>

  const doneLink = document.getElementById("prDone").value.trim();

  let clientId = document.getElementById("prClient").value;
  let clientName = "";
  const newClient = document.getElementById("prClientNew").value.trim();
  if (clientId === "__new" || (!clientId && newClient)) {
    if (!newClient) return toast("Add a client name or select a client.", "bad");
    const c = { id:id(), name:newClient, platform:"", notes:"", createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() };
    app.clients.push(c);
    clientId = c.id;
    clientName = c.name;
  } else {
    clientName = app.clients.find(c => c.id === clientId)?.name || newClient || "";
  }
  const paid = document.getElementById("prPaid").checked;
  const status = document.getElementById("prStatus").value;
  const data = {
    clientId, clientName, title, rawLink, doneLink, scriptLink, assetsLink,
    deadline: document.getElementById("prDeadline").value,
    deliveredDate: document.getElementById("prDelivered").value || (status === "Completed" ? todayInTz() : ""),
    priority: document.getElementById("prPriority").value,
    status,
    paymentType: document.getElementById("prPaymentType").value,
    amount: num(document.getElementById("prAmount").value),
    currency: document.getElementById("prCurrency").value,
    videos: num(document.getElementById("prVideos").value),
    minutes: num(document.getElementById("prMinutes").value),
    paymentReceived: paid,
    paymentDate: document.getElementById("prPaymentDate").value || (paid ? todayInTz() : ""),
    notes: document.getElementById("prNotes").value.trim(),
    updatedAt: new Date().toISOString()
  };
  if (data.paymentType !== "Free" && data.amount <= 0) return toast("Payment amount must be more than 0.", "bad");
  if (projectId) Object.assign(app.projects.find(p => p.id === projectId), data);
  else app.projects.push({ id:id(), createdAt:new Date().toISOString(), ...data });
  closeModal(); toast("Project saved."); render();

function calendarHtml(year, month) {
  const first = new Date(Date.UTC(year, month, 1));
  const last = new Date(Date.UTC(year, month + 1, 0));
  const startDay = first.getUTCDay();
  const days = last.getUTCDate();
  const cells = [];
  for (let i=0;i<startDay;i++) cells.push(`<div class="cal-day off"></div>`);
  for (let day=1; day<=days; day++) {
    const date = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const pay = app.projects.filter(p => projectEarned(p) && projectPaymentDate(p) === date);
    const done = app.projects.filter(p => p.deliveredDate === date);
    const due = app.projects.filter(p => p.deadline === date && p.status !== "Completed");
    const active = pay.length || done.length || due.length;
    cells.push(`<div class="cal-day ${active ? "active" : ""}" title="${date}">
      <div class="cal-num">${day}</div>
      <div class="dots">${pay.length?`<span class="dot pay" title="payment"></span>`:""}${done.length?`<span class="dot done" title="delivered"></span>`:""}${due.length?`<span class="dot due" title="deadline"></span>`:""}</div>
    </div>`);
  }
  return `<div class="calendar-grid">${WEEKDAYS.map(d => `<div class="cal-head">${d}</div>`).join("")}${cells.join("")}</div>
    <div class="row" style="margin-top:12px;gap:8px;flex-wrap:wrap">
      <span class="chip good"><span class="dot pay"></span>Payment</span><span class="chip info"><span class="dot done"></span>Delivered</span><span class="chip warn"><span class="dot due"></span>Deadline</span>
    </div>`;
}
function trendSvg(year, month) {
  const days = new Date(Date.UTC(year, month+1, 0)).getUTCDate();
  const values = [];
  let running = 0;
  for (let d=1; d<=days; d++) {
    const date = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    app.projects.filter(p => projectEarned(p) && projectPaymentDate(p) === date).forEach(p => running += projectAmount(p));
    values.push(running);
  }
  const max = Math.max(...values, 1);
  const points = values.map((v,i) => `${(i/(days-1||1)*100).toFixed(2)},${(170 - v/max*135).toFixed(2)}`).join(" ");
  const fill = `0,180 ${points} 100,180`;
  return `<svg class="graph" viewBox="0 0 100 180" preserveAspectRatio="none">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="currentColor" stop-opacity=".45"/><stop offset="1" stop-color="currentColor" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${fill}" fill="url(#g)" style="color:var(--primary)"></polygon>
    <polyline points="${points}" fill="none" stroke="var(--primary)" stroke-width="1.5" vector-effect="non-scaling-stroke"></polyline>
  </svg>`;
}
function exportEarnings() {
  const rows = [["Date","Client","Project","Amount","Currency","Amount in profile currency"]];
  app.projects.filter(projectEarned).forEach(p => {
    const client = app.clients.find(c => c.id === p.clientId)?.name || p.clientName || "";
    rows.push([projectPaymentDate(p), client, p.title, p.amount, p.currency || profileCurrency(), projectAmount(p)]);
  });
  downloadCsv("velora-earnings.csv", rows);
}
function downloadCsv(name, rows) {
  const csv = rows.map(r => r.map(v => `"${String(v ?? "").replace(/"/g,'""')}"`).join(",")).join("\n");
  const url = URL.createObjectURL(new Blob([csv], {type:"text/csv"}));
  const a = document.createElement("a");
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
  toast("CSV exported.");
}

      </div>
      <div class="grid-2">
        <div><label class="label">Your timezone (searchable)</label><input id="pfTimezone" class="field" list="timezoneList" value="${attr(app.profile.timezone || "UTC")}" placeholder="Search timezone or country"></div>
        <div><label class="label">Add client timezone</label><div class="search-row"><input id="clientTzInput" class="field" list="timezoneList" placeholder="Search timezone"><button class="btn btn-secondary btn-small" onclick="addClientTimezone()" type="button">Add</button></div></div>
      </div>
      <div class="row" style="flex-wrap:wrap">${(app.profile.clientTimezones || []).map(tz => `<span class="chip">${esc(tz)} <button class="btn-ghost" style="padding:0;min-height:0;color:inherit" onclick="removeClientTimezone('${attr(tz)}')">x</button></span>`).join("") || `<span class="small muted">No client timezones yet.</span>`}</div>
      <div class="row between list-card">
        <div><div style="font-weight:800">Hide payment by default</div><div class="small muted">Blur all money numbers across the app</div></div>
        <button class="toggle ${app.profile.hidePayment?"on":""}" onclick="app.profile.hidePayment=!app.profile.hidePayment;render()"><span></span></button>
      </div>
      <button class="btn btn-green" onclick="saveProfile()">Save profile</button>
      <button class="btn btn-secondary" onclick="logout()">Sign out</button>
    </div>
  </div></div>`;
}
function syncCountryCurrency() {
  const country = document.getElementById("pfCountry").value;
  if (COUNTRY_CURRENCY[country]) document.getElementById("pfCountryCurrency").value = COUNTRY_CURRENCY[country];
}
function saveProfile() {
  app.profile.name = document.getElementById("pfName").value.trim();
  app.profile.email = document.getElementById("pfEmail").value.trim();
  app.profile.description = document.getElementById("pfDesc").value.trim();
  app.profile.country = document.getElementById("pfCountry").value;
  app.profile.countryCurrency = document.getElementById("pfCountryCurrency").value;
  app.profile.theme = document.getElementById("pfTheme").value;
  app.profile.timezone = cleanTz(document.getElementById("pfTimezone").value);
  app.profile.extraCurrencies = Array.from(document.querySelectorAll(".pfExtraCurrency:checked")).map(x => x.value);
  if (!app.profile.extraCurrencies.includes("USD")) app.profile.extraCurrencies.push("USD");
  toast("Profile saved.");
  render();
}
function addClientTimezone() {
  const tz = cleanTz(document.getElementById("clientTzInput").value);
  if (!tz) return;
  app.profile.clientTimezones = Array.from(new Set([...(app.profile.clientTimezones || []), tz]));
  toast("Client timezone added.");
  render();
}
function removeClientTimezone(tz) {
  app.profile.clientTimezones = (app.profile.clientTimezones || []).filter(x => x !== tz);
  render();
}
function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error || new Error("Could not read image"));
    reader.readAsDataURL(file);
  });
}
function resizePhotoDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const image = new Image();
      image.onload = () => {
        const max = 420;
        const scale = Math.min(1, max / Math.max(image.width, image.height));
        const width = Math.max(1, Math.round(image.width * scale));
        const height = Math.max(1, Math.round(image.height * scale));
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(image, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", 0.82));
      };
      image.onerror = reject;
      image.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function uploadPhoto(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  if (!file.type.startsWith("image/")) {
    toast("Please upload an image file.", "bad");
    return;
  }
  try {
    let dataUrl;
    try {
      dataUrl = await resizePhotoDataUrl(file);
    } catch {
      dataUrl = await readFileAsDataUrl(file);
    }
    if (String(dataUrl).length > 1500000) {
      toast("This image is too large. Please use a smaller photo.", "bad");
      return;
    }
    app.profile.photo = dataUrl;
    if (save()) toast("Profile photo updated.");
    render();
  } catch {
    toast("Could not upload this photo.", "bad");
  } finally {
    input.value = "";
  }
}

function afterRender() {
  updateClock();
  clearInterval(window.__clockTimer);
  window.__clockTimer = setInterval(updateClock, 1000);
}
function updateClock() {
  const el = document.getElementById("liveClock");
  if (!el) return;
  try {
    el.textContent = new Intl.DateTimeFormat("en", { timeZone: cleanTz(app.profile.timezone), hour:"2-digit", minute:"2-digit", second:"2-digit" }).format(new Date());
  } catch { el.textContent = new Date().toLocaleTimeString(); }
}
function seedIfEmpty() {
  if (app.clients.length || app.projects.length || app.expenses.length) return;
  const c1 = { id:id(), name:"Alex Johnson", platform:"YouTube", notes:"Fast paced travel edits.", createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() };
  const c2 = { id:id(), name:"Motion Studio", platform:"Instagram", notes:"Motion design client.", createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() };
  app.clients.push(c1,c2);
}

fillTimezoneDatalist();
setTheme();
loadRates();
render();
</script>
</body>
